model_list:
  # DashScope
  - model_name: qwen3.5-plus
    litellm_params:
      model: openai/qwen3.5-plus
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  - model_name: qwen3.5-plus-non-thinking
    litellm_params:
      model: openai/qwen3.5-plus
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: false

  - model_name: kimi-k2.5
    litellm_params:
      model: openai/kimi-k2.5
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  - model_name: kimi-k2.5-non-thinking
    litellm_params:
      model: openai/kimi-k2.5
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000

  - model_name: glm-5
    litellm_params:
      model: openai/glm-5
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  - model_name: MiniMax-M2.5
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  # WhatAI.cc
  - model_name: grok-4-1-fast-reasoning
    litellm_params:
      model: openai/grok-4-1-fast-reasoning
      api_base: https://api.whatai.cc/v1
      api_key: "os.environ/WHATAI_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  # Claude SDK subagent auto-selects this model — redirect to kimi-k2.5
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: openai/kimi-k2.5
      api_base: https://coding.dashscope.aliyuncs.com/v1
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

litellm_settings:
  drop_params: true
