model_list:
  # DashScope
  - model_name: qwen3.6-plus
    litellm_params:
      model: anthropic/qwen3.6-plus
      api_base: https://coding.dashscope.aliyuncs.com/apps/anthropic
      api_key: "os.environ/QWEN_API_KEY"
      rpm: 1000
      extra_body:
        enable_thinking: true

  - model_name: qwen3.6-plus-non-thinking
